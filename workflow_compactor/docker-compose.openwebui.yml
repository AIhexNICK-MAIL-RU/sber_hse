services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    depends_on:
      - app
    ports:
      - "3000:8080"
    environment:
      - OPENAI_API_BASE_URL=http://app:8000/v1
      - OPENAI_API_KEY=dummy-key
    volumes:
      - open-webui-data:/app/backend/data

volumes:
  open-webui-data:

